<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Ranking - Eres Cero</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 4vw;
            margin-top: 3vh;
        }

        .contenedor-rankings {
            display: flex;
            justify-content: center;
            gap: 5vw;
            margin-top: 5vh;
        }

        .recuadro {
            border: 3px solid black;
            padding: 2vh 2vw;
            width: 35vw;
            height: 60vh;
            overflow-y: scroll;
            text-align: center;
        }

        .recuadro h2 {
            font-size: 2vw;
            margin-bottom: 2vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        th, td {
            border: 1px solid black;
            padding: 1vh;
            font-size: 1.5vw;
            white-space: nowrap;
        }

        th {
            background-color: #72b4f6;
        }

        .boton-volver {
            display: block;
            margin: 3vh auto 0 auto;
            font-size: 1.5vw;
            padding: 1vh 2vw;
            background-color: #72b4f6;
            border: 2px solid black;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Ranking</h1>

    <div class="contenedor-rankings">

        <div class="recuadro">
            <h2>Ranking Histórico</h2>
            <table id="tabla-historico">
                <tr><th>Posición</th><th>Jugador</th><th>Puntaje</th> <th>correo</th></tr>
            </table>
        </div>

        <div class="recuadro">
            <h2>Ranking Semanal</h2>
            <table id="tabla-semanal">
                <tr><th>Posición</th><th>Jugador</th><th>Puntaje</th> <th>correo</th>   </tr>
            </table>
        </div>

    </div>

    <a href="index.html"><button class="boton-volver">Volver</button></a>

 <script src="JS/ranking.js"></script>
</body>

</html>
