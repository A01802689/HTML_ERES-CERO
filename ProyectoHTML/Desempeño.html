<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desempeño del Alumno</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            padding: 20px;
            background-color: #0f172a;
            color: white;
        }

        h1, h2, h3 {
            margin-bottom: 10px;
        }

        input, button {
            padding: 10px;
            margin: 10px 5px 20px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background-color: #e94560;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #e94560;
        }


        .contenedor-graficas {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .grafica {
            flex: 1;
            background-color: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        canvas {
            width: 100% !important;
            height: 250px !important;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #e94560;
            text-align: center;
            letter-spacing: normal; 
            word-spacing: normal;  
            white-space: normal;     
        }

        th {
            background-color: #1a1a2e;
        }

        tr:hover {
            background-color: #475569;
        }

        th, td {
    text-align: center;
}
    </style>
</head>

<body>

    <h1>Desempeño del Alumno</h1>
     <a href="index.html"><button class="boton-volver">Volver</button></a>

   
    <input type="email" id="correo" placeholder="Ingresa correo del alumno @">
    <button onclick="cargarDatos()">Buscar</button>

    <div class="contenedor-graficas">

     
        <div class="grafica">
            <h3>Puntaje</h3>
            <canvas id="graficaPuntaje"></canvas>
        </div>

        <div class="grafica">
            <h3>Partidas por Dificultad</h3>
            <canvas id="graficaTiempo"></canvas>
        </div>

    </div>

    <h2>🏆 Logros</h2>
    <table id="tablaLogros">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="4">Sin datos</td>
            </tr>
        </tbody>
    </table>

    <!-- JS -->
    <script src="JS/desempeno.js"></script>

</body>
</html>
